<div class="wrap">
  <div class="form-card">

    <div class="form-header">
      <div class="form-title">Crear cuenta</div>
      <div class="form-sub">Biblioteca JC — Registro de usuario</div>
    </div>

    <div *ngIf="errorMessage" class="msg err">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="msg ok">{{ successMessage }}</div>

    <div class="field-row">
      <div class="field">
        <label>Nombre *</label>
        <input type="text" [(ngModel)]="nombre" [disabled]="isLoading" placeholder="Nombre">
      </div>
      <div class="field">
        <label>Apellido *</label>
        <input type="text" [(ngModel)]="apellido" [disabled]="isLoading" placeholder="Apellido">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>CURP</label>
        <input type="text" [(ngModel)]="curp" [disabled]="isLoading" placeholder="XXXX000000XXXXXX00">
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input type="text" [(ngModel)]="telefono" [disabled]="isLoading" placeholder="55 0000 0000">
      </div>
    </div>

    <div class="field">
      <label>Correo electrónico *</label>
      <input type="email" [(ngModel)]="email" [disabled]="isLoading" placeholder="correo@ejemplo.com">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Contraseña *</label>
        <input type="password" [(ngModel)]="password" [disabled]="isLoading" placeholder="Mínimo 8 caracteres">
      </div>
      <div class="field">
        <label>Confirmar contraseña *</label>
        <input type="password" [(ngModel)]="confirmPassword" [disabled]="isLoading" placeholder="Repite tu contraseña">
      </div>
    </div>

    <button class="btn-primary" (click)="registrar()" [disabled]="isLoading">
      {{ isLoading ? 'Registrando...' : 'Crear cuenta' }}
    </button>

    <p class="footer-text">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>

  </div>
</div>
