<div class="login-container">
  <h2>Registro</h2>

  <input type="text" placeholder="Nombre" [(ngModel)]="nombre">
  <input type="text" placeholder="Apellido" [(ngModel)]="apellido">
  <input type="text" placeholder="CURP" [(ngModel)]="curp">
  <input type="text" placeholder="Teléfono" [(ngModel)]="telefono">
  <input type="email" placeholder="Correo" [(ngModel)]="email">
  <input type="password" placeholder="Contraseña" [(ngModel)]="password">

  <button (click)="registrar()">Registrarse</button>

  <p>
    ¿Ya tienes cuenta?
    <a routerLink="/login">Inicia sesión</a>
  </p>
</div>
