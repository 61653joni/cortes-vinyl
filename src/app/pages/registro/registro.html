<div class="login-container">
  <h2>Registro</h2>

  <!-- Mensajes de error y éxito -->
  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>
  
  <div *ngIf="successMessage" class="success-message">
    {{ successMessage }}
  </div>

  <!-- Campos del formulario -->
  <input 
    type="text" 
    placeholder="Nombre" 
    [(ngModel)]="nombre"
    [disabled]="isLoading"
    required>
  
  <input 
    type="text" 
    placeholder="Apellido" 
    [(ngModel)]="apellido"
    [disabled]="isLoading"
    required>
  
  <input 
    type="text" 
    placeholder="CURP" 
    [(ngModel)]="curp"
    [disabled]="isLoading">
  
  <input 
    type="text" 
    placeholder="Teléfono" 
    [(ngModel)]="telefono"
    [disabled]="isLoading">
  
  <input 
    type="email" 
    placeholder="Correo electrónico" 
    [(ngModel)]="email"
    [disabled]="isLoading"
    required>
  
  <input 
    type="password" 
    placeholder="Contraseña" 
    [(ngModel)]="password"
    [disabled]="isLoading"
    required>
  
  <!-- ✅ NUEVO: Campo para confirmar contraseña -->
  <input 
    type="password" 
    placeholder="Confirmar contraseña" 
    [(ngModel)]="confirmPassword"
    [disabled]="isLoading"
    required>

  <!-- ✅ Botón con estado de carga -->
  <button (click)="registrar()" [disabled]="isLoading">
    <span *ngIf="!isLoading">Registrarse</span>
    <span *ngIf="isLoading">Registrando...</span>
  </button>

  <p>
    ¿Ya tienes cuenta?
    <a routerLink="/login">Inicia sesión</a>
  </p>
</div>
