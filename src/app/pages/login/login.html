<div class="wrap">
  <div class="form-card">

    <div class="form-header">
      <div class="form-title">Iniciar sesión</div>
      <div class="form-sub">Biblioteca JC — Acceso a tu cuenta</div>
    </div>

    <div *ngIf="errorMessage" class="msg err">{{ errorMessage }}</div>

    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="email" name="email"
        placeholder="correo@ejemplo.com" [disabled]="isLoading">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" name="password"
        placeholder="Tu contraseña" [disabled]="isLoading">
    </div>

    <button class="btn-primary" (click)="login()" [disabled]="isLoading">
      {{ isLoading ? 'Entrando...' : 'Entrar' }}
    </button>

    <p class="footer-text">
      ¿No tienes cuenta? <a routerLink="/registro">Regístrate</a>
    </p>

  </div>
</div>
