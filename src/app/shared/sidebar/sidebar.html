<div class="sidebar">

  <div class="sidebar-logo">
    JC <span>Vende</span> Libros
  </div>

  <nav class="sidebar-nav">

    <!-- ✅ Libros - Redirige a /Dashboard/libros -->
    <a routerLink="/Dashboard/libros" routerLinkActive="active" class="sidebar-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="9" rx="1"/>
        <rect x="14" y="3" width="7" height="9" rx="1"/>
        <rect x="3" y="15" width="7" height="6" rx="1"/>
        <rect x="14" y="15" width="7" height="6" rx="1"/>
      </svg>
      Libros
    </a>

    <!-- ✅ Prestaciones - Redirige a /Dashboard/prestaciones -->
    <a routerLink="/Dashboard/prestaciones" routerLinkActive="active" class="sidebar-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/>
        <line x1="9" y1="16" x2="13" y2="16"/>
      </svg>
      Prestaciones
    </a>

    <!-- ✅ Usuarios - Redirige a /Dashboard/usuarios -->
    <a routerLink="/Dashboard/usuarios" routerLinkActive="active" class="sidebar-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="9" cy="7" r="4"/>
        <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        <path d="M21 21v-2a4 4 0 0 0-3-3.87"/>
      </svg>
      Usuarios
    </a>

  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">{{ (usuario?.nombre || usuario?.email)?.[0]?.toUpperCase() }}</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">{{ usuario?.nombre || usuario?.email }}</span>
        <span class="sidebar-user-role">Administrador</span>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()">Salir</button>
  </div>

</div>
