<!-- src/app/components/navbar/navbar.component.html -->
<nav class="navbar">
  <a class="logo" (click)="irHome()">
    <img src="/assets/images/logo.jpg" alt="JC Prestaciones Libros">
  </a>

  <!-- Menú para usuarios normales -->
  <ul class="nav-links" *ngIf="!esAdmin">
    <li><a routerLink="/inicio">Inicio</a></li>
    <!-- ✅ Categorías dinámicas desde el backend -->
    <li *ngFor="let categoria of categorias">
      <a [routerLink]="['/categoria', categoria.id]">
        {{ categoria.nombre }}
      </a>
    </li>
  </ul>

  <!-- Menú para administradores -->
  <ul class="nav-links" *ngIf="esAdmin">
    <li><a routerLink="/dashboard">Dashboard</a></li>
    <li><a routerLink="/libros">Libros</a></li>
    <li><a routerLink="/categorias">Categorías</a></li>
    <li><a routerLink="/prestamos">Préstamos</a></li>
    <li><a routerLink="/usuarios">Usuarios</a></li>
  </ul>

  <div class="nav-actions">
    <a *ngIf="!usuario" routerLink="/login" class="btn-login">Iniciar sesión</a>

    <div *ngIf="usuario" class="user-menu">
      <button class="user-trigger" (click)="menuAbierto = !menuAbierto">
        <div class="avatar">{{ (usuario.nombre || usuario.email)[0].toUpperCase() }}</div>
        <span class="user-name">{{ usuario.nombre || usuario.email }}</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="dropdown" *ngIf="menuAbierto">
        <a routerLink="/perfil" (click)="menuAbierto = false" class="dropdown-item">Ver perfil</a>
        <button (click)="logout()" class="dropdown-item dropdown-logout">Cerrar sesión</button>
      </div>
    </div>
  </div>
</nav>
